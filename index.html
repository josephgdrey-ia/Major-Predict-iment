<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍓</text></svg>">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2312794D%22/><text y=%22.9em%22 x=%220.05em%22 font-size=%2280%22>🍓</text></svg>">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wimbledon Fantasy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#F4F7F6] text-gray-800 min-h-screen font-sans">

    <header class="bg-[#12794D] shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🍓</span>
                <h1 class="text-xl font-black tracking-tight text-white uppercase">Major Predict-iment <span class="font-normal opacity-80">(Wimbledon 2026)</span></h1>
            </div>
            <nav class="flex bg-[#0d5c3a] p-1 rounded-lg border border-[#0a4a2e]">
                <button onclick="switchView('leaderboard')" id="nav-leaderboard" class="px-4 py-2 rounded-md text-sm font-bold transition-all cursor-pointer bg-[#5A3A88] text-white shadow-sm">Leaderboard</button>
                <button onclick="switchView('teams')" id="nav-teams" class="px-4 py-2 rounded-md text-sm font-bold transition-all cursor-pointer text-white/80 hover:text-white">See Teams</button>
                <button onclick="switchView('admin')" id="nav-admin" class="px-4 py-2 rounded-md text-sm font-bold transition-all cursor-pointer text-white/80 hover:text-white">Admin Hub</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section id="view-leaderboard" class="view-content block">
            <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
                <h2 class="text-xl font-black mb-4 flex items-center gap-2 text-[#12794D]">🏆 Standings</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-200 text-gray-500 text-sm uppercase tracking-wider font-bold">
                                <th class="pb-3 pl-4 w-16">Rank</th>
                                <th class="pb-3">Manager</th>
                                <th class="pb-3 text-right pr-4">Total Points</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-rows" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-teams" class="view-content hidden">
            <div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

        <section id="view-admin" class="view-content hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm lg:col-span-1 h-fit">
                    <h3 class="text-lg font-black mb-4 text-[#5A3A88]">➕ Add Tennis Player</h3>
                    <form id="add-player-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Player Name</label>
                            <input type="text" id="new-player-name" required class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#5A3A88] focus:border-transparent transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Flag Emoji</label>
                            <input type="text" id="new-player-flag" placeholder="e.g. 🇬🇧" required class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#5A3A88] focus:border-transparent transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Gender</label>
                            <select id="new-player-gender" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#5A3A88] focus:border-transparent transition-all">
                                <option value="Men">Men</option>
                                <option value="Women">Women</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Draft Tier</label>
                            <select id="new-player-tier" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#5A3A88] focus:border-transparent transition-all">
                                <option value="Top 10">Top 10</option>
                                <option value="Top 25">Top 25</option>
                                <option value="Rest of Field">Rest of Field</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-[#12794D] hover:bg-[#0e613d] text-white font-bold py-2.5 rounded-lg transition-colors cursor-pointer mt-2">Save Player</button>
                    </form>
                </div>

                <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm lg:col-span-2">
                    <h3 class="text-lg font-black mb-1 text-[#12794D]">🎾 Live Match Win Tracker</h3>
                    <p class="text-sm text-gray-500 mb-4 border-b border-gray-100 pb-4">Manage wins, assignments, and elimination status.</p>
                    <div id="admin-players-list" class="divide-y divide-gray-100 max-h-[500px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- 1. CONFIGURATION & INITIALIZATION ---
        const SUPABASE_URL = "https://frhvoqwzeipuspzvulcj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_Y8YLRrHYwTsW1CfJbB3fUQ_RCPxqxt4";
        
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let localPlayers = [];
        let localTeams = [];

        function calculatePoints(wins) {
            let total = 0;
            for (let i = 1; i <= wins; i++) { total += i; }
            return total;
        }

        // --- 2. VIEW CONTROLLER (WITH PASSWORD) ---
        function switchView(viewId) {
            if (viewId === 'admin') {
                const password = prompt("Enter the Admin Password:");
                if (password !== "PIMS") { 
                    alert("Incorrect password. Ask Joe if something is incorrect!");
                    return; 
                }
            }

            document.querySelectorAll('.view-content').forEach(el => el.classList.replace('block', 'hidden'));
            document.getElementById(`view-${viewId}`).classList.replace('hidden', 'block');
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('bg-[#5A3A88]', 'text-white', 'shadow-sm');
                btn.classList.add('text-white/80', 'hover:text-white');
            });
            const activeBtn = document.getElementById(`nav-${viewId}`);
            activeBtn.classList.remove('text-white/80', 'hover:text-white');
            activeBtn.classList.add('bg-[#5A3A88]', 'text-white', 'shadow-sm');

            fetchCoreData().then(() => {
                if (viewId === 'leaderboard') renderLeaderboard();
                if (viewId === 'teams') renderTeams();
                if (viewId === 'admin') renderAdminHub();
            });
        }

        // --- 3. DATA FETCHING ---
        async function fetchCoreData() {
            // Note: Added flag and is_out to the query
            const { data: players, error: pErr } = await dbClient.from('players').select('*').order('name', { ascending: true });
            const { data: teams, error: tErr } = await dbClient.from('teams').select('id, owner_name, players(id, name, gender, tier, wins, flag, is_out)');
            
            if (pErr || tErr) {
                console.error("Database error:", pErr || tErr);
                return;
            }
            localPlayers = players;
            localTeams = teams;
        }

        // --- 4. DATA RENDERING ---
        function renderLeaderboard() {
            const standings = localTeams.map(team => {
                const totalPoints = team.players.reduce((sum, p) => sum + calculatePoints(p.wins), 0);
                return { name: team.owner_name, points: totalPoints };
            }).sort((a, b) => b.points - a.points);

            const tbody = document.getElementById('leaderboard-rows');
            if (standings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">No team standings found. Setup rosters in Admin Hub.</td></tr>`;
                return;
            }

            tbody.innerHTML = standings.map((team, idx) => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="py-4 pl-4 font-black text-lg ${idx === 0 ? 'text-[#5A3A88]' : idx === 1 ? 'text-[#12794D]' : 'text-gray-400'}">${idx + 1}</td>
                    <td class="py-4 font-bold text-gray-800">${team.name}</td>
                    <td class="py-4 text-right pr-4 font-black text-[#12794D]">${team.points} pts</td>
                </tr>
            `).join('');
        }

        function renderTeams() {
            const container = document.getElementById('teams-grid');
            if (localTeams.length === 0) {
                container.innerHTML = `<div class="p-6 text-gray-500 bg-white rounded-xl w-full text-center border border-gray-200">No teams created yet.</div>`;
                return;
            }

            container.innerHTML = localTeams.map(team => {
                const teamTotal = team.players.reduce((sum, p) => sum + calculatePoints(p.wins), 0);
                return `
                    <div class="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm space-y-4 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-baseline border-b border-gray-100 pb-3">
                            <h3 class="text-xl font-black text-gray-800">Team ${team.owner_name}</h3>
                            <span class="text-sm font-bold text-[#12794D] bg-green-50 px-3 py-1 rounded-full border border-green-200">${teamTotal} pts</span>
                        </div>
                        <div class="space-y-2.5">
                            ${team.players.length === 0 ? '<div class="text-xs text-gray-400 italic p-2">No players drafted yet.</div>' : ''}
                            ${team.players.map(p => `
                                <div class="flex justify-between items-center p-3 rounded-xl border ${p.is_out ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-100'}">
                                    <div>
                                        <div class="font-bold flex items-center gap-1.5 ${p.is_out ? 'text-red-800 line-through opacity-80' : 'text-gray-800'}">
                                            <span>${p.flag || '🏳️'}</span> 
                                            <span>${p.name}</span>
                                            ${p.is_out ? '<span class="text-[10px] bg-red-200 text-red-800 px-1.5 py-0.5 rounded font-black no-underline ml-1">OUT</span>' : ''}
                                        </div>
                                        <div class="text-xs font-semibold mt-0.5 flex gap-1.5 items-center ${p.is_out ? 'text-red-700/60' : 'text-gray-500'}">
                                            <span class="px-1.5 py-0.5 rounded text-[10px] tracking-wider uppercase font-extrabold ${p.gender === 'Men' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-purple-50 text-[#5A3A88] border border-purple-100'}">${p.gender}</span>
                                            <span>•</span>
                                            <span>${p.tier}</span>
                                        </div>
                                    </div>
                                    <div class="text-right ${p.is_out ? 'opacity-80' : ''}">
                                        <div class="text-sm font-bold ${p.is_out ? 'text-red-800' : 'text-gray-800'}">${p.wins} ${p.wins === 1 ? 'Win' : 'Wins'}</div>
                                        <div class="text-xs font-bold ${p.is_out ? 'text-red-700' : 'text-[#12794D]'}">+${calculatePoints(p.wins)} pts</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAdminHub() {
            const list = document.getElementById('admin-players-list');
            if (localPlayers.length === 0) {
                list.innerHTML = `<p class="py-4 text-center text-gray-500">No players found. Add players using the left panel.</p>`;
                return;
            }

            list.innerHTML = localPlayers.map(p => {
                const currentOwner = localTeams.find(t => t.players.some(tp => tp.id === p.id));
                
                return `
                    <div class="py-3.5 flex flex-col sm:flex-row sm:items-center justify-between gap-3 ${p.is_out ? 'bg-red-50/50' : 'hover:bg-gray-50'} px-2 rounded-lg transition-colors -mx-2">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-gray-800 text-base">${p.flag || '🏳️'} ${p.name}</span>
                                <label class="inline-flex items-center cursor-pointer ml-2 bg-white px-2 py-0.5 rounded border border-gray-200 shadow-sm">
                                    <input type="checkbox" ${p.is_out ? 'checked' : ''} onchange="toggleOutStatus(${p.id}, this.checked)" class="w-3 h-3 text-red-600 rounded border-gray-300">
                                    <span class="ml-1.5 text-[10px] font-bold ${p.is_out ? 'text-red-600' : 'text-gray-500'} uppercase tracking-wider">Out</span>
                                </label>
                            </div>
                            <div class="flex gap-2 items-center text-xs text-gray-500 font-medium mt-1">
                                <span class="${p.gender === 'Men' ? 'text-blue-600' : 'text-[#5A3A88]'} font-bold">${p.gender}</span>
                                <span>•</span>
                                <span>${p.tier}</span>
                                <span>•</span>
                                <select onchange="assignPlayerToTeam(${p.id}, this.value)" class="bg-white border border-gray-300 rounded px-1.5 py-0.5 text-xs text-gray-700 focus:outline-none focus:border-[#5A3A88] cursor-pointer shadow-sm">
                                    <option value="">Unassigned</option>
                                    ${localTeams.map(t => `<option value="${t.id}" ${currentOwner?.id === t.id ? 'selected' : ''}>Drafted by ${t.owner_name}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 justify-end">
                            <span class="text-sm font-mono text-gray-500 uppercase tracking-wider text-[10px] font-bold">Wins: <strong id="admin-win-box-${p.id}" class="text-gray-900 text-base font-black ml-1">${p.wins}</strong></span>
                            <div class="inline-flex rounded-lg border border-gray-200 p-0.5 bg-gray-100 shadow-sm">
                                <button onclick="modifyWins(${p.id}, -1)" class="px-3 py-1 font-black text-red-500 hover:bg-white hover:shadow-sm rounded transition-all cursor-pointer">-</button>
                                <button onclick="modifyWins(${p.id}, 1)" class="px-3 py-1 font-black text-[#12794D] hover:bg-white hover:shadow-sm rounded transition-all cursor-pointer">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 5. ADMIN INTERACTIONS ---
        async function modifyWins(playerId, change) {
            const winLabel = document.getElementById(`admin-win-box-${playerId}`);
            let currentWins = parseInt(winLabel.innerText);
            let nextWins = Math.max(0, currentWins + change);

            const { error } = await dbClient.from('players').update({ wins: nextWins }).eq('id', playerId);
            if (error) {
                alert("Database write rejected.");
            } else {
                winLabel.innerText = nextWins;
                let pIndex = localPlayers.findIndex(p => p.id === playerId);
                if (pIndex !== -1) localPlayers[pIndex].wins = nextWins;
            }
        }

        async function assignPlayerToTeam(playerId, teamIdStr) {
            await dbClient.from('team_rosters').delete().eq('player_id', playerId);

            if (teamIdStr !== "") {
                const teamId = parseInt(teamIdStr);
                const { error } = await dbClient.from('team_rosters').insert({ team_id: teamId, player_id: playerId });
                if (error) alert("Draft mapping execution failed.");
            }
            fetchCoreData().then(() => renderAdminHub());
        }

        async function toggleOutStatus(playerId, isOut) {
            const { error } = await dbClient.from('players').update({ is_out: isOut }).eq('id', playerId);
            if (error) {
                alert("Could not update elimination status.");
            } else {
                let pIndex = localPlayers.findIndex(p => p.id === playerId);
                if (pIndex !== -1) localPlayers[pIndex].is_out = isOut;
                
                // Refresh data to ensure proper re-renders across views
                fetchCoreData().then(() => {
                    if (!document.getElementById('view-admin').classList.contains('hidden')) renderAdminHub();
                    if (!document.getElementById('view-teams').classList.contains('hidden')) renderTeams();
                });
            }
        }

        document.getElementById('add-player-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('new-player-name').value;
            const flag = document.getElementById('new-player-flag').value;
            const gender = document.getElementById('new-player-gender').value;
            const tier = document.getElementById('new-player-tier').value;

            const { error } = await dbClient.from('players').insert({ name, flag, gender, tier, wins: 0, is_out: false });
            if (error) {
                alert("Could not append player records.");
            } else {
                document.getElementById('add-player-form').reset();
                fetchCoreData().then(() => renderAdminHub());
            }
        });

        // Initial App Ecosystem Load
        fetchCoreData().then(() => renderLeaderboard());
    </script>
</body>
</html>
